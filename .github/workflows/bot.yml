name: Parallel jobs by email

on:
  push:
    branches: "actions"
  workflow_dispatch:

jobs:
  run-per-email:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - email: thomasslebew24410@gmail.com
            proxy: "socks5h://37.120.189.175:1080"
          - email: cihuyyhuda@gmail.com
            proxy: "socks5h://157.90.183.51:5555"

    steps:
      - uses: actions/checkout@v7  # FIX: latest, v6 bukan latest
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Buat config.json
        env:
          EMAIL: ${{ matrix.email }}
          PASSWORD: ${{ secrets.PASSWORD }}
          WARYONO: ${{ secrets.WARYONO }}
        run: |
          python3 - <<'PY'
          import json
          import os

          config = {
              "email": os.environ["EMAIL"],
              "password": os.environ["PASSWORD"],
              "apikey": os.environ["WARYONO"]
          }

          with open("config.json", "w") as f:
              json.dump(config, f, indent=2)
          PY

      - name: Run task
        run: |
          pip install opencv-python rich aiohttp
          export ALL_PROXY=${{ matrix.proxy }}
          timeout 300 python3 bot.py || true

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7  # FIX: pakai @v7 bukan @v7.0.1
        with:
          name: bctt-log-${{ matrix.email }}  # FIX: wajib unik antar matrix job
          path: ./bctt.log
          archive: false
          if-no-files-found: ignore

      - name: Commit & Push
        run: |
          git config user.name "callmehuda"
          git config user.email "mafatikhul.huda118@smk.belajar.id"
          echo "Last run: $(date '+%Y-%m-%d %H:%M:%S')" > last_run.txt
          git add last_run.txt
          git diff --staged --quiet || git commit -m "chore: update last run $(date '+%Y-%m-%d %H:%M')"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:actions
