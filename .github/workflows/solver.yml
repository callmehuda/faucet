name: Test Bun App with Nginx and Local DNS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-nginx-proxy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install and Configure Nginx
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo bash -c 'cat > /etc/nginx/sites-available/api.waryono.my.id <<EOF
          server {
              listen 80;
              server_name api.waryono.my.id;

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          EOF'
          
          sudo ln -s /etc/nginx/sites-available/api.waryono.my.id /etc/nginx/sites-enabled/
          sudo systemctl restart nginx

      - name: Update /etc/hosts (Local DNS Mapping)
        run: |
          sudo bash -c 'echo "127.0.0.1 api.waryono.my.id" >> /etc/hosts'
          cat /etc/hosts

      - name: Run Bun App in Background
        run: |
          bun main.ts > bun.log 2>&1 &
          sleep 5
          cat bun.log
          sudo ss -tulpn | grep :3000 || echo "Waduh"

      - name: Test Request via cURL
        run: |
          curl -v http://api.waryono.my.id/in.php
          