name: Test Bun App with Nginx and Local DNS

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-nginx-proxy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Google Chrome & Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install and Configure Nginx with SSL
        run: |
          sudo apt-get install -y nginx
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo mkdir -p /etc/nginx/ssl
          
          sudo openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout /etc/nginx/ssl/api.waryono.my.id.key \
            -out /etc/nginx/ssl/api.waryono.my.id.crt \
            -subj "/C=ID/ST=Z/L=Z/O=Z/OU=Z/CN=api.waryono.my.id"
          
          sudo bash -c 'cat > /etc/nginx/sites-available/api.waryono.my.id <<EOF
          server {
              listen 80;
              listen 443 ssl;
              server_name api.waryono.my.id;

              ssl_certificate /etc/nginx/ssl/api.waryono.my.id.crt;
              ssl_certificate_key /etc/nginx/ssl/api.waryono.my.id.key;

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          EOF'
          
          sudo ln -s /etc/nginx/sites-available/api.waryono.my.id /etc/nginx/sites-enabled/
          sudo systemctl restart nginx

      - name: Trust Self-Signed Certificate Globally
        run: |
          sudo cp /etc/nginx/ssl/api.waryono.my.id.crt /usr/local/share/ca-certificates/api.waryono.my.id.crt
          sudo update-ca-certificates

      - name: Update /etc/hosts
        run: |
          sudo bash -c 'echo "127.0.0.1 api.waryono.my.id" >> /etc/hosts'

      - name: Run Bun App with Virtual Display
        run: |
          xvfb-run --server-args="-screen 0 1280x1024x24" bun main.ts --headless true > bun.log 2>&1 &
          sleep 8
          cat bun.log
          sudo ss -tulpn | grep :3000

      - name: Test Request via cURL
        run: |
          curl -v https://api.waryono.my.id/health
          curl -v -X POST https://api.waryono.my.id/in.php \
            -H "Content-Type: application/json" \
            -d '{"methods": "turnstile", "domain": "https://example.com", "sitekey": "0x4AAAAAAAWpDOW926zX_xyz"}'
